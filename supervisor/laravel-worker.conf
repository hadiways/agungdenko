[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /opt/dws-portal/backend/artisan queue:work --sleep=3 --tries=3 --max-time=3600
directory=/opt/dws-portal/backend
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=nginx
numprocs=4
redirect_stderr=true
stdout_logfile=/var/log/supervisor/laravel-worker.log
stopwaitsecs=3600
