<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DWS Admin | Manage Products</title>
    <!-- Fonts, Tailwind, Lucide, Web Components -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#084C8F',
                            blueDark: '#063A70',
                            blueLight: '#86A8BD',
                            darkBg: '#0B1B2B',
                            darkCard: '#122438',
                            accent: '#2F80ED',
                            lightBg: '#F5F8FB'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../styles/theme.css">
    
    <!-- Data & Components -->
    <script src="../data/products.js"></script>
    <script src="../components/admin/Sidebar.js"></script>
</head>
<body class="bg-brand-lightBg text-gray-800 font-sans antialiased overflow-x-hidden">

    <!-- Admin Sidebar Component -->
    <dws-admin-sidebar></dws-admin-sidebar>

    <!-- Main Content Area -->
    <main class="lg:ml-64 min-h-screen pt-20 lg:pt-0 p-6 md:p-8 flex flex-col justify-between">
        <div class="space-y-8">
            <!-- Header section -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-gray-200 pb-5">
                <div>
                    <h1 class="text-brand-darkBg font-display font-extrabold text-2xl md:text-3xl">Manajemen Produk</h1>
                    <p class="text-gray-500 text-sm mt-1">Kelola katalog forklift dan alat berat PT Denko Wahana Sakti.</p>
                </div>
            </div>

            <!-- Main Layout: Form Left, Active Products Right -->
            <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                <!-- Form upload produk (1 col) -->
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 space-y-6">
                    <h3 class="text-brand-darkBg font-display font-bold text-lg border-b border-gray-100 pb-4">Tambah Produk Baru</h3>
                    
                    <form id="product-form" class="space-y-4">
                        <div>
                            <label class="block text-gray-500 text-xs font-bold uppercase mb-2">Nama Produk</label>
                            <input type="text" id="prod-name" placeholder="Contoh: Forklift Electric Noblelift" required class="w-full bg-brand-lightBg border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all">
                        </div>
                        
                        <div>
                            <label class="block text-gray-500 text-xs font-bold uppercase mb-2">Kategori</label>
                            <select id="prod-category" required class="w-full bg-brand-lightBg border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all">
                                <option value="" disabled selected>Pilih Kategori</option>
                                <option value="Forklift">Forklift</option>
                                <option value="Reach Truck">Reach Truck</option>
                                <option value="Stacker">Stacker</option>
                                <option value="Pallet">Pallet</option>
                                <option value="Aerial Work Platform">Aerial Work Platform</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-gray-500 text-xs font-bold uppercase mb-2">Upload Image</label>
                            <div class="border-2 border-dashed border-gray-200 rounded-xl p-6 flex flex-col items-center justify-center text-center hover:border-brand-blue transition-colors cursor-pointer group">
                                <i data-lucide="upload-cloud" class="w-8 h-8 text-gray-400 group-hover:text-brand-blue transition-colors mb-2"></i>
                                <span class="text-xs text-gray-500 font-semibold group-hover:text-brand-blue transition-colors">Pilih file gambar</span>
                                <span class="text-[10px] text-gray-400 mt-1">PNG, JPG up to 5MB</span>
                            </div>
                        </div>

                        <div>
                            <label class="block text-gray-500 text-xs font-bold uppercase mb-2">Deskripsi Produk</label>
                            <textarea id="prod-desc" rows="4" placeholder="Tuliskan spesifikasi, keunggulan, dan deskripsi produk..." required class="w-full bg-brand-lightBg border border-gray-200 rounded-xl p-4 text-sm focus:outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all"></textarea>
                        </div>

                        <button type="submit" class="w-full bg-brand-blue hover:bg-brand-blueDark text-white font-bold text-xs uppercase tracking-wider py-3.5 rounded-xl shadow-lg hover:shadow-brand-blue/20 active:scale-95 transition-all duration-150">
                            Simpan Produk
                        </button>
                    </form>
                </div>

                <!-- Active products grid (2 cols) -->
                <div class="xl:col-span-2 space-y-6">
                    <div class="flex items-center justify-between border-b border-gray-200 pb-4">
                        <h3 class="text-brand-darkBg font-display font-bold text-lg">Katalog Saat Ini</h3>
                        <span class="text-xs font-semibold bg-brand-blue/15 text-brand-blue px-3 py-1 rounded-full" id="prod-count">6 Produk Aktif</span>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6" id="admin-product-grid"></div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="text-center text-xs text-gray-400 mt-16 border-t border-gray-200 pt-6">
            &copy; 2026 PT Denko Wahana Sakti. Administrator Dashboard Panel.
        </footer>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const productGrid = document.getElementById('admin-product-grid');
            productGrid.innerHTML = PRODUCTS_DATA.map(p => `
                <div class="bg-white border border-gray-100 rounded-2xl p-4 shadow-sm hover:shadow-md transition-shadow flex items-center gap-4 group">
                    <div class="w-20 h-20 rounded-xl bg-brand-lightBg flex-shrink-0 flex items-center justify-center p-2 border border-gray-100">
                        <img src="../${p.image}" alt="${p.name}" class="max-h-full max-w-full object-contain group-hover:scale-105 transition-transform duration-200">
                    </div>
                    <div class="flex-1 min-w-0">
                        <span class="text-brand-blue font-bold text-[9px] uppercase tracking-wider bg-brand-blue/10 px-2 py-0.5 rounded">${p.category}</span>
                        <h4 class="text-brand-darkBg font-bold text-sm truncate mt-1.5">${p.name}</h4>
                        <p class="text-gray-400 text-xs truncate mt-0.5">${p.description}</p>
                    </div>
                    <button class="text-gray-400 hover:text-red-500 transition-colors p-2" title="Hapus Produk">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('');

            lucide.createIcons();

            // Form Submit Alert (Mock)
            const form = document.getElementById('product-form');
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                alert('Produk berhasil disimpan ke katalog dummy (memori browser)!');
                form.reset();
            });
        });
    </script>
</body>
</html>
