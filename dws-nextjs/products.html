<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produk Kami | PT Denko Wahana Sakti</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Katalog Produk PT Denko Wahana Sakti - Forklift Electric, Forklift Diesel, Reach Truck, Electric Stacker, Hand Pallet, Scissor Lift.">
    <!-- Fonts, Tailwind, Lucide, Web Components -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#084C8F',
                            blueDark: '#063A70',
                            blueLight: '#86A8BD',
                            darkBg: '#0B1B2B',
                            darkCard: '#122438',
                            accent: '#2F80ED',
                            lightBg: '#F3F6F9'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles/theme.css">
    
    <!-- Data & Components -->
    <script src="data/products.js"></script>
    <script src="components/Navbar.js"></script>
    <script src="components/Footer.js"></script>
</head>
<body class="bg-brand-lightBg text-gray-800 font-sans antialiased overflow-x-hidden">

    <!-- Navbar -->
    <dws-navbar></dws-navbar>

    <!-- Page Title Header -->
    <section class="relative bg-brand-darkBg pt-32 pb-16 px-6 text-center border-b border-white/5">
        <div class="absolute inset-0 bg-cover bg-center opacity-25 z-0" style="background-image: url('./public/images/hero-forklift.jpg');"></div>
        <div class="relative z-10 max-w-3xl mx-auto">
            <span class="text-brand-blueLight font-bold text-xs uppercase tracking-widest block mb-2">KATALOG MATERIAL HANDLING</span>
            <h1 class="text-white font-display font-extrabold text-3xl sm:text-4xl md:text-5xl">Produk Kami</h1>
        </div>
    </section>

    <!-- Products Grid Section -->
    <section class="py-24 px-6 md:px-12 bg-white">
        <div class="container mx-auto">
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <!-- Footer -->
    <dws-footer></dws-footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const productGrid = document.getElementById('product-grid');
            productGrid.innerHTML = PRODUCTS_DATA.map(p => `
                <div class="group bg-brand-lightBg/50 border border-brand-blueLight/20 rounded-3xl p-5 shadow-sm hover:shadow-xl hover:-translate-y-1.5 transition-all duration-300 flex flex-col justify-between">
                    <div class="relative overflow-hidden rounded-2xl bg-white mb-5 aspect-[4/3] flex items-center justify-center p-6 border border-brand-blueLight/10 shadow-inner">
                        <img src="${p.image}" alt="${p.name}" class="max-h-full max-w-full object-contain group-hover:scale-105 transition-transform duration-300" loading="lazy">
                        <div class="absolute top-3 left-3 bg-brand-blue text-white text-[9px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wider border border-brand-blueLight/20">
                            ${p.category}
                        </div>
                    </div>
                    <div>
                        <h3 class="text-brand-darkBg font-display font-bold text-lg mb-1 group-hover:text-brand-blue transition-colors duration-200">${p.name}</h3>
                        <p class="text-gray-600 text-xs mb-6 leading-relaxed">${p.description}</p>
                    </div>
                    <button onclick="requestQuote('${p.id}')" class="text-brand-blue font-bold text-xs uppercase tracking-wider flex items-center gap-1.5 group/btn hover:text-brand-accent transition-colors mt-auto self-start">
                        Minta Penawaran <span class="transform group-hover/btn:translate-x-1 transition-transform duration-200">&rarr;</span>
                    </button>
                </div>
            `).join('');

            lucide.createIcons();
        });

        function requestQuote(productId) {
            const footerEl = document.querySelector('dws-footer');
            if (footerEl) {
                const select = footerEl.querySelector('#select-product');
                if (select) select.value = productId;
                const formSection = footerEl.querySelector('#kontak');
                if (formSection) formSection.scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
