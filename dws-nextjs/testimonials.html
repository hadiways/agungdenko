<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimoni Pelanggan | PT Denko Wahana Sakti</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Testimoni & Review Pelanggan PT Denko Wahana Sakti.">
    <!-- Fonts, Tailwind, Lucide, Web Components -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#084C8F',
                            blueDark: '#063A70',
                            blueLight: '#86A8BD',
                            darkBg: '#0B1B2B',
                            darkCard: '#122438',
                            accent: '#2F80ED',
                            lightBg: '#F3F6F9'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles/theme.css">
    
    <!-- Data & Components -->
    <script src="data/testimonials.js"></script>
    <script src="components/Navbar.js"></script>
    <script src="components/Footer.js"></script>
</head>
<body class="bg-brand-lightBg text-gray-800 font-sans antialiased overflow-x-hidden">

    <!-- Navbar -->
    <dws-navbar></dws-navbar>

    <!-- Page Title Header -->
    <section class="relative bg-brand-darkBg pt-32 pb-16 px-6 text-center border-b border-white/5">
        <div class="absolute inset-0 bg-cover bg-center opacity-25 z-0" style="background-image: url('./public/images/hero-forklift.jpg');"></div>
        <div class="relative z-10 max-w-3xl mx-auto">
            <span class="text-brand-blueLight font-bold text-xs uppercase tracking-widest block mb-2">ULASAN & KEPUASAN</span>
            <h1 class="text-white font-display font-extrabold text-3xl sm:text-4xl md:text-5xl">Testimoni Pelanggan</h1>
        </div>
    </section>

    <!-- Testimonials Grid Section -->
    <section class="py-24 px-6 md:px-12 bg-white">
        <div class="container mx-auto max-w-5xl">
            <div id="testimonials-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <!-- Footer -->
    <dws-footer></dws-footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('testimonials-grid');
            grid.innerHTML = TESTIMONIALS_DATA.map(t => `
                <div class="bg-brand-lightBg border border-blue-100 rounded-3xl p-6 shadow-sm flex flex-col justify-between min-h-[220px]">
                    <div>
                        <div class="flex gap-1 text-brand-accent mb-4">
                            ${Array(t.rating).fill().map(() => `<svg class="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>`).join('')}
                        </div>
                        <p class="text-gray-600 text-xs sm:text-sm italic mb-6 leading-relaxed">"${t.comment}"</p>
                    </div>
                    <div class="border-t border-gray-100 pt-4">
                        <h4 class="text-brand-darkBg font-bold text-sm leading-tight">${t.company}</h4>
                        <p class="text-gray-400 text-[10px] mt-0.5">Verified Client</p>
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
        });
    </script>
</body>
</html>
