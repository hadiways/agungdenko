<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Kegiatan | PT Denko Wahana Sakti</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Galeri Dokumentasi Unit & Kegiatan Layanan Lapangan PT Denko Wahana Sakti.">
    <!-- Fonts, Tailwind, Lucide, Web Components -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#084C8F',
                            blueDark: '#063A70',
                            blueLight: '#86A8BD',
                            darkBg: '#0B1B2B',
                            darkCard: '#122438',
                            accent: '#2F80ED',
                            lightBg: '#F3F6F9'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles/theme.css">
    
    <!-- Components -->
    <script src="components/Navbar.js"></script>
    <script src="components/Footer.js"></script>
</head>
<body class="bg-brand-lightBg text-gray-800 font-sans antialiased overflow-x-hidden">

    <!-- Navbar -->
    <dws-navbar></dws-navbar>

    <!-- Page Title Header -->
    <section class="relative bg-brand-darkBg pt-32 pb-16 px-6 text-center border-b border-white/5">
        <div class="absolute inset-0 bg-cover bg-center opacity-25 z-0" style="background-image: url('./public/images/hero-forklift.jpg');"></div>
        <div class="relative z-10 max-w-3xl mx-auto">
            <span class="text-brand-blueLight font-bold text-xs uppercase tracking-widest block mb-2">DOKUMENTASI OPERASIONAL</span>
            <h1 class="text-white font-display font-extrabold text-3xl sm:text-4xl md:text-5xl">Galeri Kegiatan</h1>
        </div>
    </section>

    <!-- Gallery Grid Section -->
    <section class="py-24 px-6 md:px-12 bg-white">
        <div class="container mx-auto">
            <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </section>

    <!-- Footer -->
    <dws-footer></dws-footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const galleryList = [
                { title: "Forklift Warehouse", image: "./public/images/gallery/gallery-1.jpg" },
                { title: "Scissor Lift", image: "./public/images/gallery/gallery-2.jpg" },
                { title: "Maintenance", image: "./public/images/gallery/gallery-3.jpg" },
                { title: "Delivery Truck", image: "./public/images/gallery/gallery-4.jpg" },
                { title: "Service Technician", image: "./public/images/gallery/gallery-5.jpg" },
                { title: "Team Photo", image: "./public/images/gallery/gallery-6.jpg" }
            ];

            const galleryGrid = document.getElementById('gallery-grid');
            galleryGrid.innerHTML = galleryList.map(g => `
                <div class="relative overflow-hidden rounded-2xl group aspect-[4/3] bg-brand-darkBg cursor-pointer shadow-sm hover:shadow-lg transition-all duration-300">
                    <img src="${g.image}" alt="${g.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 ease-out filter brightness-95 group-hover:brightness-100" loading="lazy">
                    <div class="absolute inset-0 bg-gradient-to-t from-brand-darkBg/90 via-brand-darkBg/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-4">
                        <span class="text-white font-semibold text-xs sm:text-sm">${g.title}</span>
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
        });
    </script>
</body>
</html>
