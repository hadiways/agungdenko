<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layanan Kami | PT Denko Wahana Sakti</title>
    <!-- SEO Meta Tags -->
    <meta name="description" content="Layanan Penjualan, Rental, Servis, Sparepart Forklift & Material Handling PT Denko Wahana Sakti.">
    <!-- Fonts, Tailwind, Lucide, Web Components -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#084C8F',
                            blueDark: '#063A70',
                            blueLight: '#86A8BD',
                            darkBg: '#0B1B2B',
                            darkCard: '#122438',
                            accent: '#2F80ED',
                            lightBg: '#F3F6F9'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles/theme.css">
    
    <!-- Data & Components -->
    <script src="data/services.js"></script>
    <script src="components/Navbar.js"></script>
    <script src="components/Footer.js"></script>
</head>
<body class="bg-brand-lightBg text-gray-800 font-sans antialiased overflow-x-hidden">

    <!-- Navbar -->
    <dws-navbar></dws-navbar>

    <!-- Page Title Header -->
    <section class="relative bg-brand-darkBg pt-32 pb-16 px-6 text-center border-b border-white/5">
        <div class="absolute inset-0 bg-cover bg-center opacity-25 z-0" style="background-image: url('./public/images/hero-forklift.jpg');"></div>
        <div class="relative z-10 max-w-3xl mx-auto">
            <span class="text-brand-blueLight font-bold text-xs uppercase tracking-widest block mb-2">LAYANAN & PERBAIKAN</span>
            <h1 class="text-white font-display font-extrabold text-3xl sm:text-4xl md:text-5xl">Layanan Kami</h1>
        </div>
    </section>

    <!-- Services Section -->
    <section class="py-24 px-6 md:px-12 bg-white">
        <div class="container mx-auto">
            <div id="services-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </div>
    </section>

    <!-- Footer -->
    <dws-footer></dws-footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const servicesGrid = document.getElementById('services-grid');
            servicesGrid.innerHTML = SERVICES_DATA.map(s => `
                <div class="bg-brand-lightBg rounded-3xl p-6 border border-blue-100/50 shadow-sm hover:shadow-xl hover:-translate-y-1.5 transition-all duration-300 flex flex-col justify-between group">
                    <div>
                        <div class="w-12 h-12 rounded-2xl bg-white border border-brand-blueLight/20 flex items-center justify-center mb-6 text-brand-blue group-hover:bg-brand-blue group-hover:text-white transition-all duration-300">
                            ${s.icon}
                        </div>
                        <h3 class="text-brand-darkBg font-display font-bold text-lg mb-2 group-hover:text-brand-blue transition-colors">${s.title}</h3>
                        <p class="text-gray-500 text-xs leading-relaxed">
                            Layanan prima dari PT Denko Wahana Sakti untuk menjamin efisiensi dan keamanan operasional pergudangan Anda.
                        </p>
                    </div>
                </div>
            `).join('');

            lucide.createIcons();
        });
    </script>
</body>
</html>
