name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: |
          cd dws-nextjs
          npm install --legacy-peer-deps

      - name: Build Frontend
        run: |
          cd dws-nextjs
          npm run build

      - name: Build Sanity Studio
        run: |
          cd studio
          npm install --legacy-peer-deps
          npm run build

      - name: Compress Project Files
        run: |
          tar -czf ../project.tar.gz --exclude=.git --exclude=.github .
          mv ../project.tar.gz .

      - name: Copy Archive to Server via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "project.tar.gz"
          target: "/tmp"

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          envs: DB_PASSWORD
          script: |
            set -e
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
            PROJECT_DIR="/opt/dws-portal"

            echo "🚀 Memulai proses deploy..."

            # ── Deteksi OS Version untuk Remi ───────────────────
            OS_VER=$(grep "^VERSION_ID" /etc/os-release | cut -d'"' -f2 | cut -d'.' -f1)
            echo "📋 OS Version: $OS_VER"

            # ── Install Git ──────────────────────────────────────
            if ! command -v git &>/dev/null; then
              echo "📦 Install git..."
              if command -v dnf &>/dev/null; then dnf install -y git; else yum install -y git; fi
            fi

            # ── Install/Upgrade PHP 8.3 ──────────────────────────
            PHP_VER=$(php -r 'echo PHP_MAJOR_VERSION.".".PHP_MINOR_VERSION;' 2>/dev/null || echo "0.0")
            PHP_MAJOR=$(echo "$PHP_VER" | cut -d'.' -f1)
            PHP_MINOR=$(echo "$PHP_VER" | cut -d'.' -f2)
            echo "🐘 PHP versi saat ini: $PHP_VER"

            NEED_UPGRADE=0
            if [ "$PHP_MAJOR" -lt 8 ]; then NEED_UPGRADE=1
            elif [ "$PHP_MAJOR" -eq 8 ] && [ "$PHP_MINOR" -lt 2 ]; then NEED_UPGRADE=1
            fi

            if [ "$NEED_UPGRADE" -eq 1 ]; then
              echo "⚙️ Upgrade PHP ke 8.3 dari Remi..."
              if command -v dnf &>/dev/null; then
                dnf install -y epel-release 2>/dev/null || true
                dnf install -y "https://rpms.remirepo.net/enterprise/remi-release-${OS_VER}.rpm" 2>/dev/null || true
                dnf module reset php -y 2>/dev/null || true
                dnf module enable php:remi-8.3 -y 2>/dev/null || true
                dnf remove -y 'php*' 2>/dev/null || true
                dnf install -y php php-fpm php-cli php-common php-mysqlnd php-pdo \
                  php-mbstring php-xml php-curl php-zip php-bcmath php-gd php-intl \
                  php-opcache php-process php-tokenizer
              else
                yum install -y epel-release 2>/dev/null || true
                yum install -y "https://rpms.remirepo.net/enterprise/remi-release-${OS_VER}.rpm" 2>/dev/null || true
                yum-config-manager --enable remi-php83 2>/dev/null || true
                yum remove -y 'php*' 2>/dev/null || true
                yum install -y php php-fpm php-cli php-common php-mysqlnd php-pdo \
                  php-mbstring php-xml php-curl php-zip php-bcmath php-gd php-intl \
                  php-opcache php-process php-tokenizer
              fi
              systemctl enable php-fpm 2>/dev/null || true
              systemctl restart php-fpm 2>/dev/null || true
              echo "✅ PHP $(php -v | head -1)"
            else
              echo "✅ PHP $PHP_VER sudah memenuhi syarat"
            fi

            # ── Install MySQL 8.0 ────────────────────────────────
            if ! systemctl is-active --quiet mysqld 2>/dev/null; then
              echo "🗄️ Install MySQL 8.0..."
              if command -v dnf &>/dev/null; then
                dnf install -y "https://dev.mysql.com/get/mysql80-community-release-el${OS_VER}-1.noarch.rpm" 2>/dev/null || true
                dnf install -y mysql-community-server 2>/dev/null || true
              else
                yum install -y "https://dev.mysql.com/get/mysql80-community-release-el${OS_VER}-1.noarch.rpm" 2>/dev/null || true
                yum install -y mysql-community-server 2>/dev/null || true
              fi
              systemctl enable mysqld
              systemctl start mysqld
              sleep 5

              # Ambil temporary root password
              TEMP_PASS=$(grep 'temporary password' /var/log/mysqld.log 2>/dev/null | awk '{print $NF}' | tail -1 || echo "")
              if [ -n "$TEMP_PASS" ]; then
                echo "🔐 Reset root password MySQL..."
                mysql --connect-expired-password -uroot -p"${TEMP_PASS}" \
                  -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '${DB_PASSWORD}'; FLUSH PRIVILEGES;" 2>/dev/null || true
              fi
              echo "✅ MySQL siap"
            else
              echo "✅ MySQL sudah running"
            fi

            # ── Buat database & user jika belum ada ─────────────
            echo "🗃️ Setup database agungdenko_db..."
            mysql -uroot -p"${DB_PASSWORD}" --connect-expired-password 2>/dev/null <<MYSQL_SETUP || true
            CREATE DATABASE IF NOT EXISTS agungdenko_db CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
            CREATE USER IF NOT EXISTS 'agungdenko_user'@'localhost' IDENTIFIED BY '${DB_PASSWORD}';
            GRANT ALL PRIVILEGES ON agungdenko_db.* TO 'agungdenko_user'@'localhost';
            FLUSH PRIVILEGES;
            MYSQL_SETUP
            echo "✅ Database agungdenko_db siap"

            # ── Install Composer ─────────────────────────────────
            if ! command -v composer &>/dev/null; then
              echo "🎼 Install Composer..."
              curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
              chmod +x /usr/local/bin/composer
            fi
            echo "✅ $(composer --version)"

            # ── Install Caddy ────────────────────────────────────
            if ! command -v caddy &>/dev/null; then
              echo "🌐 Install Caddy via binary..."
              curl -fsSL "https://github.com/caddyserver/caddy/releases/download/v2.9.1/caddy_2.9.1_linux_amd64.tar.gz" \
                -o /tmp/caddy.tar.gz
              tar -xzf /tmp/caddy.tar.gz -C /usr/local/bin caddy
              chmod +x /usr/local/bin/caddy
              groupadd --system caddy 2>/dev/null || true
              useradd --system --gid caddy --create-home \
                --home-dir /var/lib/caddy --shell /usr/sbin/nologin caddy 2>/dev/null || true
              cat > /etc/systemd/system/caddy.service << 'CADDYSVC'
            [Unit]
            Description=Caddy
            After=network-online.target
            Requires=network-online.target
            [Service]
            Type=notify
            User=caddy
            Group=caddy
            ExecStart=/usr/local/bin/caddy run --environ --config /etc/caddy/Caddyfile
            ExecReload=/usr/local/bin/caddy reload --config /etc/caddy/Caddyfile --force
            TimeoutStopSec=5s
            LimitNOFILE=1048576
            AmbientCapabilities=CAP_NET_BIND_SERVICE
            [Install]
            WantedBy=multi-user.target
            CADDYSVC
              systemctl daemon-reload
              systemctl enable caddy
              mkdir -p /etc/caddy /var/log/caddy
              echo "✅ Caddy $(caddy version)"
            fi

            # ── Ekstrak Perubahan Terbaru ────────────────────────
            echo "📦 Mengekstrak file project..."
            mkdir -p "$PROJECT_DIR"
            tar -xzf /tmp/project.tar.gz -C "$PROJECT_DIR"
            rm -f /tmp/project.tar.gz

            # ── Inject DB credentials ke .env ────────────────────
            echo "🔑 Inject DB credentials ke .env..."
            ENV_FILE="$PROJECT_DIR/backend/.env"
            EXISTING_KEY=""
            if [ -f "$ENV_FILE" ]; then
              EXISTING_KEY=$(grep -E "^APP_KEY=" "$ENV_FILE" | cut -d'=' -f2- | tr -d '"' | tr -d "'" | xargs)
            fi
            cp "$PROJECT_DIR/backend/.env.production" "$ENV_FILE"
            if [ -n "$EXISTING_KEY" ]; then
              sed -i "s|^APP_KEY=.*|APP_KEY=${EXISTING_KEY}|" "$ENV_FILE"
            fi
            sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${DB_PASSWORD}|" "$ENV_FILE"
            sed -i "s|^DB_DATABASE=.*|DB_DATABASE=agungdenko_db|" "$ENV_FILE"
            sed -i "s|^DB_USERNAME=.*|DB_USERNAME=agungdenko_user|" "$ENV_FILE"
            sed -i "s|^DB_HOST=.*|DB_HOST=127.0.0.1|" "$ENV_FILE"
            echo "✅ DB credentials ter-inject ke .env"

            # ── Jalankan deploy.sh ───────────────────────────────
            echo "⚙️ Menjalankan deploy.sh..."
            cd "$PROJECT_DIR"
            bash deploy.sh
