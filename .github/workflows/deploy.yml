name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
            PROJECT_DIR="/opt/dws-portal"
            REPO_URL="https://github.com/hadiways/agungdenko.git"

            echo "🚀 Memulai proses deploy..."

            # ── Deteksi OS Version untuk Remi ───────────────────
            OS_VER=$(grep "^VERSION_ID" /etc/os-release | cut -d'"' -f2 | cut -d'.' -f1)
            echo "📋 OS Version: $OS_VER"

            # ── Install Git ──────────────────────────────────────
            if ! command -v git &>/dev/null; then
              echo "📦 Install git..."
              if command -v dnf &>/dev/null; then
                dnf install -y git
              else
                yum install -y git
              fi
            fi

            # ── Upgrade PHP ke 8.3 jika belum memenuhi syarat ───
            PHP_VER=$(php -r 'echo PHP_MAJOR_VERSION.".".PHP_MINOR_VERSION;' 2>/dev/null || echo "0.0")
            echo "🐘 PHP versi saat ini: $PHP_VER"
            PHP_MAJOR=$(echo "$PHP_VER" | cut -d'.' -f1)
            PHP_MINOR=$(echo "$PHP_VER" | cut -d'.' -f2)

            # Butuh minimal PHP 8.2 untuk Laravel 12
            NEED_UPGRADE=0
            if [ "$PHP_MAJOR" -lt 8 ]; then
              NEED_UPGRADE=1
            elif [ "$PHP_MAJOR" -eq 8 ] && [ "$PHP_MINOR" -lt 2 ]; then
              NEED_UPGRADE=1
            fi

            if [ "$NEED_UPGRADE" -eq 1 ]; then
              echo "⚙️ PHP $PHP_VER tidak memenuhi syarat (butuh >=8.2), upgrade ke PHP 8.3..."

              if command -v dnf &>/dev/null; then
                dnf install -y epel-release 2>/dev/null || true
                dnf install -y "https://rpms.remirepo.net/enterprise/remi-release-${OS_VER}.rpm" 2>/dev/null || true
                dnf module reset php -y 2>/dev/null || true
                dnf module enable php:remi-8.3 -y 2>/dev/null || true
                dnf remove -y 'php*' 2>/dev/null || true
                dnf install -y \
                  php php-fpm php-cli php-common \
                  php-mysqlnd php-pdo php-mbstring \
                  php-xml php-curl php-zip \
                  php-bcmath php-gd php-intl \
                  php-opcache php-process php-tokenizer
              else
                yum install -y epel-release 2>/dev/null || true
                yum install -y "https://rpms.remirepo.net/enterprise/remi-release-${OS_VER}.rpm" 2>/dev/null || true
                yum-config-manager --enable remi-php83 2>/dev/null || true
                yum remove -y 'php*' 2>/dev/null || true
                yum install -y \
                  php php-fpm php-cli php-common \
                  php-mysqlnd php-pdo php-mbstring \
                  php-xml php-curl php-zip \
                  php-bcmath php-gd php-intl \
                  php-opcache php-process php-tokenizer
              fi

              # Pastikan symlink php tersedia di PATH
              PHP_BIN=$(command -v php83 2>/dev/null || command -v php 2>/dev/null || echo "")
              if [ -n "$PHP_BIN" ] && [ "$PHP_BIN" != "/usr/local/bin/php" ]; then
                ln -sf "$PHP_BIN" /usr/local/bin/php 2>/dev/null || true
              fi

              systemctl enable php-fpm 2>/dev/null || systemctl enable php83-php-fpm 2>/dev/null || true
              systemctl restart php-fpm 2>/dev/null || systemctl restart php83-php-fpm 2>/dev/null || true

              echo "✅ PHP setelah upgrade: $(php -v | head -1)"
            else
              echo "✅ PHP $PHP_VER sudah memenuhi syarat (>=8.2)"
            fi

            # ── Verifikasi PHP versi akhir ───────────────────────
            php -v | head -1

            # ── Install Composer ─────────────────────────────────
            if ! command -v composer &>/dev/null && [ ! -f /usr/local/bin/composer ]; then
              echo "🎼 Install Composer..."
              curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
              chmod +x /usr/local/bin/composer
            fi
            /usr/local/bin/composer --version
            echo "✅ Composer siap"

            # ── Install Caddy ────────────────────────────────────
            if ! command -v caddy &>/dev/null && [ ! -f /usr/local/bin/caddy ]; then
              echo "🌐 Install Caddy via binary..."
              curl -fsSL "https://github.com/caddyserver/caddy/releases/download/v2.9.1/caddy_2.9.1_linux_amd64.tar.gz" \
                -o /tmp/caddy.tar.gz
              tar -xzf /tmp/caddy.tar.gz -C /usr/local/bin caddy
              chmod +x /usr/local/bin/caddy
              groupadd --system caddy 2>/dev/null || true
              useradd --system --gid caddy --create-home \
                --home-dir /var/lib/caddy --shell /usr/sbin/nologin caddy 2>/dev/null || true
              cat > /etc/systemd/system/caddy.service << 'CADDYSVC'
            [Unit]
            Description=Caddy
            After=network-online.target
            Requires=network-online.target
            [Service]
            Type=notify
            User=caddy
            Group=caddy
            ExecStart=/usr/local/bin/caddy run --environ --config /etc/caddy/Caddyfile
            ExecReload=/usr/local/bin/caddy reload --config /etc/caddy/Caddyfile --force
            TimeoutStopSec=5s
            LimitNOFILE=1048576
            AmbientCapabilities=CAP_NET_BIND_SERVICE
            [Install]
            WantedBy=multi-user.target
            CADDYSVC
              systemctl daemon-reload
              systemctl enable caddy
              mkdir -p /etc/caddy /var/log/caddy
              echo "✅ Caddy $(caddy version)"
            fi

            # ── Clone atau Pull Repo ─────────────────────────────
            mkdir -p /opt
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "📥 Cloning repository..."
              git clone "$REPO_URL" "$PROJECT_DIR"
            else
              echo "📥 Pulling perubahan terbaru..."
              cd "$PROJECT_DIR" && git pull origin main
            fi

            # ── Jalankan deploy.sh ───────────────────────────────
            echo "⚙️ Menjalankan deploy.sh..."
            cd "$PROJECT_DIR"
            export PATH="/usr/local/bin:$PATH"
            bash deploy.sh
