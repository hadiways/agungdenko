name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            set -e
            export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$PATH"
            PROJECT_DIR="/opt/dws-portal"
            REPO_URL="https://github.com/hadiways/agungdenko.git"

            echo "🚀 Memulai proses deploy..."

            # ── Deteksi OS Version untuk Remi ───────────────────
            OS_VER=$(cat /etc/os-release | grep "^VERSION_ID" | cut -d'"' -f2 | cut -d'.' -f1)
            echo "📋 OS Version: $OS_VER"

            # ── Install Git ──────────────────────────────────────
            if ! command -v git &>/dev/null; then
              echo "📦 Install git..."
              yum install -y git
            fi

            # ── Install/Upgrade PHP 8.3 ──────────────────────────
            PHP_VER=$(php -r 'echo PHP_MAJOR_VERSION.".".PHP_MINOR_VERSION;' 2>/dev/null || echo "0.0")
            echo "🐘 PHP versi saat ini: $PHP_VER"

            if [[ "$PHP_VER" != "8.2" && "$PHP_VER" != "8.3" && "$PHP_VER" != "8.4" ]]; then
              echo "⚙️ Install PHP 8.3 dari Remi..."

              # Install EPEL + Remi repo
              dnf install -y epel-release 2>/dev/null || yum install -y epel-release
              dnf install -y "https://rpms.remirepo.net/enterprise/remi-release-${OS_VER}.rpm" 2>/dev/null || \
              yum install -y "https://rpms.remirepo.net/enterprise/remi-release-${OS_VER}.rpm"

              # Reset module PHP lama, aktifkan PHP 8.3 dari Remi
              dnf module reset php -y || true
              dnf module enable php:remi-8.3 -y

              # Hapus PHP lama jika ada
              dnf remove -y php php-* 2>/dev/null || true

              # Install PHP 8.3 + ekstensi Laravel
              dnf install -y \
                php php-fpm php-cli php-common \
                php-mysqlnd php-pdo php-mbstring \
                php-xml php-curl php-zip \
                php-bcmath php-gd php-intl \
                php-opcache php-process php-tokenizer

              systemctl enable php-fpm && systemctl start php-fpm
              echo "✅ PHP $(php -v | head -1)"
            else
              echo "✅ PHP $PHP_VER sudah memenuhi syarat"
            fi

            # ── Install Composer ─────────────────────────────────
            if ! command -v composer &>/dev/null; then
              echo "🎼 Install Composer..."
              curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
            fi
            echo "✅ $(composer --version)"

            # ── Install Caddy ────────────────────────────────────
            if ! command -v caddy &>/dev/null; then
              echo "🌐 Install Caddy via binary..."
              curl -fsSL "https://github.com/caddyserver/caddy/releases/download/v2.9.1/caddy_2.9.1_linux_amd64.tar.gz" \
                -o /tmp/caddy.tar.gz
              tar -xzf /tmp/caddy.tar.gz -C /usr/local/bin caddy
              chmod +x /usr/local/bin/caddy
              groupadd --system caddy 2>/dev/null || true
              useradd --system --gid caddy --create-home \
                --home-dir /var/lib/caddy --shell /usr/sbin/nologin caddy 2>/dev/null || true
              cat > /etc/systemd/system/caddy.service << 'CADDYSVC'
            [Unit]
            Description=Caddy
            After=network-online.target
            Requires=network-online.target
            [Service]
            Type=notify
            User=caddy
            Group=caddy
            ExecStart=/usr/local/bin/caddy run --environ --config /etc/caddy/Caddyfile
            ExecReload=/usr/local/bin/caddy reload --config /etc/caddy/Caddyfile --force
            TimeoutStopSec=5s
            LimitNOFILE=1048576
            AmbientCapabilities=CAP_NET_BIND_SERVICE
            [Install]
            WantedBy=multi-user.target
            CADDYSVC
              systemctl daemon-reload
              systemctl enable caddy
              mkdir -p /etc/caddy /var/log/caddy
              echo "✅ Caddy $(caddy version)"
            fi

            # ── Clone atau Pull Repo ─────────────────────────────
            mkdir -p /opt
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "📥 Cloning repository..."
              git clone "$REPO_URL" "$PROJECT_DIR"
            else
              echo "📥 Pulling perubahan terbaru..."
              cd "$PROJECT_DIR" && git pull origin main
            fi

            # ── Jalankan deploy.sh ───────────────────────────────
            echo "⚙️ Menjalankan deploy.sh..."
            cd "$PROJECT_DIR"
            bash deploy.sh
