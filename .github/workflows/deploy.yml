name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            PROJECT_DIR="/var/www/dws-portal"
            REPO_URL="https://github.com/hadiways/agungdenko.git"

            echo "🚀 Memulai proses deploy..."

            # Buat direktori parent jika belum ada
            mkdir -p /var/www

            # Clone repo jika belum ada, pull jika sudah ada
            if [ ! -d "$PROJECT_DIR/.git" ]; then
              echo "📥 Repo belum ada, cloning dari GitHub..."
              git clone "$REPO_URL" "$PROJECT_DIR"
            else
              echo "📥 Repo sudah ada, pulling perubahan terbaru..."
              cd "$PROJECT_DIR"
              git pull origin main
            fi

            echo "⚙️ Menjalankan deploy script..."
            cd "$PROJECT_DIR"
            bash deploy.sh

